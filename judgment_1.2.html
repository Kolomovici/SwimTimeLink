<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>泳道计时器</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a1e30;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
      }
      .phone-container {
        max-width: 400px;
        width: 100%;
        background: #e3ecf5;
        border-radius: 48px;
        box-shadow: 0 25px 50px -8px black;
        overflow: hidden;
        border: 2px solid #4a7b9f;
      }
      .status-bar {
        background: #0b2b44;
        color: white;
        padding: 20px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .lane-badge {
        background: #f0b81e;
        color: #1a3f5a;
        font-weight: 800;
        font-size: 1.8rem;
        padding: 6px 24px;
        border-radius: 60px;
      }
      .connection-led {
        width: 14px;
        height: 14px;
        border-radius: 14px;
        background: #aaa;
        box-shadow: 0 0 8px;
      }
      .connection-led.online {
        background: #2ecc2e;
        box-shadow: 0 0 12px #00ff00;
      }
      .main-card {
        padding: 24px 20px;
      }
      .info-panel {
        background: #c9ddf2;
        border-radius: 40px;
        padding: 16px;
        margin-bottom: 20px;
        text-align: center;
      }
      .info-panel .event {
        font-size: 1.6rem;
        font-weight: 700;
        color: #003459;
      }
      .info-panel .status {
        font-size: 1.2rem;
        margin-top: 8px;
        color: #1d5a8b;
      }
      .timer-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }
      .split-btn {
        background: #1a5f9e;
        border: none;
        border-radius: 80px;
        padding: 22px 12px;
        font-size: 1.8rem;
        font-weight: 700;
        color: white;
        box-shadow:
          0 8px 0 #0a3150,
          0 10px 20px rgba(0, 0, 0, 0.3);
        transition: 0.05s linear;
        cursor: pointer;
      }
      .split-btn:active {
        transform: translateY(6px);
        box-shadow:
          0 2px 0 #0a3150,
          0 10px 20px rgba(0, 0, 0, 0.2);
      }
      .split-btn.disabled {
        background: #7f8c8d;
        box-shadow: 0 8px 0 #4a5a5c;
        pointer-events: none;
        opacity: 0.6;
      }
      .split-btn.done {
        background: #27ae60;
        box-shadow: 0 8px 0 #1e8449;
      }
      .footer {
        background: #113750;
        color: #b0d4f0;
        padding: 16px 24px;
        font-size: 0.9rem;
        display: flex;
        justify-content: space-between;
      }
      .error-message {
        color: #ff4444;
        font-size: 0.9rem;
        text-align: center;
        margin-top: 8px;
        display: none;
      }
      .warning-message {
        color: #ffaa00;
        font-size: 0.9rem;
        text-align: center;
        margin-top: 8px;
        display: none;
      }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  </head>
  <body>
    <div class="phone-container">
      <div class="status-bar">
        <span class="lane-badge" id="laneDisplay">-</span>
        <div>
          <div class="connection-led" id="connLed"></div>
        </div>
      </div>
      <div class="main-card">
        <div class="info-panel">
          <div class="event" id="eventName">等待项目...</div>
          <div class="status" id="raceStatus">⏳ 等待发令</div>
        </div>
        <div id="buttonContainer" class="timer-buttons">
          <!-- 动态生成分段按钮 -->
        </div>
        <div style="margin-top: 20px; text-align: center; color: #1a4a73">
          <span>时钟偏移: </span><span id="offsetDisplay">0 ms</span>
        </div>
        <div id="syncError" class="error-message"></div>
        <div id="networkWarning" class="warning-message"></div>
      </div>
      <div class="footer">
        <span>服务器: <span id="serverDisplay">--</span></span>
        <span id="timeDisplay">--:--:--</span>
      </div>
    </div>

    <script>
      (function () {
        // 从URL获取参数
        const urlParams = new URLSearchParams(window.location.search);
        const lane = urlParams.get("lane") || "1";
        let serverBaseUrl = urlParams.get("server") || "";
        if (!serverBaseUrl) {
          serverBaseUrl = localStorage.getItem("lastServer") || "";
        }
        if (!serverBaseUrl) {
          alert("未指定服务器地址，请通过二维码扫描进入");
        } else {
          localStorage.setItem("lastServer", serverBaseUrl);
        }

        // 显示泳道号
        document.getElementById("laneDisplay").innerText = lane;
        document.getElementById("serverDisplay").innerText =
          serverBaseUrl.replace(/^https?:\/\//, "");

        // 全局变量
        let socket = null;
        let connected = false;
        let raceActive = false;
        let currentSplit = 0;
        let totalLaps = 0;
        let eventName = "";
        let startTime = null;
        let clockOffset = 0;
        let syncInterval = null;
        let heartbeatInterval = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        let reconnectTimer = null;
        let lastHeartbeat = Date.now();

        // UI元素
        const connLed = document.getElementById("connLed");
        const eventNameEl = document.getElementById("eventName");
        const raceStatusEl = document.getElementById("raceStatus");
        const buttonContainer = document.getElementById("buttonContainer");
        const offsetDisplay = document.getElementById("offsetDisplay");
        const timeDisplay = document.getElementById("timeDisplay");
        const syncError = document.getElementById("syncError");
        const networkWarning = document.getElementById("networkWarning");

        // 时间同步（修复容错处理）
        async function syncTime() {
          if (!serverBaseUrl) return null;

          const T1 = performance.now();
          try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            const res = await fetch(`${serverBaseUrl}/sync`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ lane: parseInt(lane) }),
              signal: controller.signal,
            });

            clearTimeout(timeoutId);

            if (!res.ok) {
              throw new Error(`HTTP ${res.status}`);
            }

            const T4 = performance.now();
            const data = await res.json();

            if (!data.server_time) {
              throw new Error("服务器返回数据格式错误");
            }

            const serverTime = data.server_time;
            const RTT = T4 - T1;
            const offset = serverTime - (T1 + RTT / 2);
            clockOffset = offset;

            const offsetMs = Math.round(offset);
            offsetDisplay.innerText = offsetMs + " ms";

            // 根据偏移量大小显示不同颜色
            if (Math.abs(offsetMs) > 100) {
              offsetDisplay.style.color = "red";
              networkWarning.innerText = "时钟偏差较大，可能影响成绩准确性";
              networkWarning.style.display = "block";
            } else {
              offsetDisplay.style.color = "green";
              networkWarning.style.display = "none";
            }

            syncError.style.display = "none";
            return offset;
          } catch (e) {
            console.warn("时间同步失败", e);

            if (e.name === "AbortError") {
              offsetDisplay.innerText = "超时";
            } else {
              offsetDisplay.innerText = "失败";
            }

            offsetDisplay.style.color = "red";
            syncError.innerText = "时间同步失败，成绩可能不准确";
            syncError.style.display = "block";

            return null;
          }
        }

        // 定期同步（修复容错）
        function startSync(interval = 30000) {
          syncTime();
          if (syncInterval) clearInterval(syncInterval);
          syncInterval = setInterval(() => {
            if (connected) {
              syncTime();
            }
          }, interval);
        }

        // 心跳检测
        function startHeartbeat() {
          if (heartbeatInterval) clearInterval(heartbeatInterval);

          heartbeatInterval = setInterval(() => {
            if (connected && socket && socket.connected) {
              lastHeartbeat = Date.now();
              socket.emit("ping", { time: Date.now() });
            } else if (connected && (!socket || !socket.connected)) {
              setConnectionStatus(false);
              attemptReconnect();
            }

            // 检查心跳超时
            if (connected && Date.now() - lastHeartbeat > 15000) {
              networkWarning.innerText = "网络延迟较高";
              networkWarning.style.display = "block";
            } else {
              networkWarning.style.display = "none";
            }
          }, 5000);
        }

        // 设置连接状态
        function setConnectionStatus(isConnected) {
          connected = isConnected;
          if (isConnected) {
            connLed.className = "connection-led online";
            networkWarning.style.display = "none";
            reconnectAttempts = 0;
          } else {
            connLed.className = "connection-led";
          }
        }

        // 尝试重连
        function attemptReconnect() {
          if (reconnectTimer) clearTimeout(reconnectTimer);

          if (reconnectAttempts < maxReconnectAttempts) {
            reconnectAttempts++;
            networkWarning.innerText = `重连中 (${reconnectAttempts}/${maxReconnectAttempts})`;
            networkWarning.style.display = "block";

            reconnectTimer = setTimeout(() => {
              if (!connected && serverBaseUrl) {
                connectWebSocket();
              }
            }, 3000 * reconnectAttempts);
          } else {
            networkWarning.innerText = "连接已断开，请刷新页面";
            networkWarning.style.display = "block";
          }
        }

        // 连接WebSocket（修复错误处理和重连）
        function connectWebSocket() {
          if (!serverBaseUrl) return;

          if (socket) {
            socket.removeAllListeners();
            socket.disconnect();
            socket = null;
          }

          try {
            socket = io(serverBaseUrl, {
              transports: ["websocket", "polling"],
              query: { lane: lane },
              reconnection: false,
              timeout: 10000,
            });

            socket.on("connect", () => {
              console.log("WS connected");
              setConnectionStatus(true);
              startHeartbeat();
            });

            socket.on("disconnect", (reason) => {
              console.log("WS disconnected:", reason);
              setConnectionStatus(false);
              if (raceActive) {
                attemptReconnect();
              }
            });

            socket.on("connect_error", (error) => {
              console.error("WS connection error:", error);
              setConnectionStatus(false);
              if (raceActive) {
                attemptReconnect();
              }
            });

            // 监听发令信号
            socket.on("start", (data) => {
              console.log("收到发令", data);
              raceActive = true;
              currentSplit = 0;
              startTime = data.start_time;
              eventName = data.project;
              totalLaps = data.segments || 1;

              // 更新UI
              eventNameEl.innerText = eventName;
              raceStatusEl.innerText = "🏊 比赛中";

              // 重置按钮状态
              generateButtons(totalLaps, eventName);

              // 清除网络警告
              networkWarning.style.display = "none";
            });

            socket.on("pong", () => {
              lastHeartbeat = Date.now();
            });
          } catch (err) {
            console.error("创建WebSocket失败:", err);
            setConnectionStatus(false);
          }
        }

        // 生成分段按钮（修复分段逻辑）
        function generateButtons(laps, eventName) {
          buttonContainer.innerHTML = "";
          for (let i = 0; i < laps; i++) {
            const btn = document.createElement("button");
            btn.className = "split-btn";

            // 根据分段位置设置文字
            if (i === laps - 1) {
              btn.innerText = "终点";
            } else {
              btn.innerText = `第${i + 1}段`;
            }

            btn.dataset.seg = i;
            btn.addEventListener("click", () => handleSplitClick(i));
            buttonContainer.appendChild(btn);
          }
        }

        // 处理分段点击（修复顺序验证错误）
        function handleSplitClick(segIndex) {
          if (!raceActive) {
            alert("比赛尚未开始");
            return;
          }

          // 修复：只允许点击当前分段（严格顺序）
          if (segIndex !== currentSplit) {
            if (segIndex < currentSplit) {
              alert(`第${segIndex + 1}段已记录`);
            } else {
              alert(`请先完成第${currentSplit + 1}段`);
            }
            return;
          }

          const localTime = Date.now();
          const serverTime = localTime + clockOffset;

          fetch(`${serverBaseUrl}/record`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lane: parseInt(lane),
              segment: segIndex + 1,
              corrected_click_time: Math.round(serverTime),
            }),
          })
            .then((res) => {
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              return res.json();
            })
            .then((data) => {
              if (data.status === "ok") {
                const btns = document.querySelectorAll(".split-btn");
                if (btns[segIndex]) {
                  btns[segIndex].classList.add("done");
                }

                currentSplit++;

                if (currentSplit >= totalLaps) {
                  raceActive = false;
                  raceStatusEl.innerText = "✅ 比赛完成";
                }
              } else {
                alert("上报失败: " + (data.message || "未知错误"));
              }
            })
            .catch((err) => {
              console.error(err);
              alert("网络错误: " + err.message);
            });
        }

        // 更新时间显示
        function updateClock() {
          const now = new Date();
          timeDisplay.innerText = now.toLocaleTimeString("en-US", {
            hour12: false,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
        }
        setInterval(updateClock, 500);

        // 初始化
        if (serverBaseUrl) {
          connectWebSocket();
          startSync();
        }

        // 页面卸载时清理
        window.addEventListener("beforeunload", () => {
          if (syncInterval) clearInterval(syncInterval);
          if (heartbeatInterval) clearInterval(heartbeatInterval);
          if (reconnectTimer) clearTimeout(reconnectTimer);
          if (socket) {
            socket.removeAllListeners();
            socket.disconnect();
          }
        });
      })();
    </script>
  </body>
</html>
